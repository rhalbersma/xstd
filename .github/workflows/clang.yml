name: Clang

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Clang ${{ matrix.label }}
    runs-on: ubuntu-22.04
    continue-on-error: ${{ matrix.best_effort }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "21"
            version: 21
            cc: clang-21
            cxx: clang++-21
            stdlib: libstdc++
            triplet: x64-linux
            cxxflags: ""
            best_effort: false
          - label: "22"
            version: 22
            cc: clang-22
            cxx: clang++-22
            stdlib: libstdc++
            triplet: x64-linux
            cxxflags: ""
            best_effort: false
          # The MSVC STL and libstdc++ are covered by the other workflows;
          # this leg adds the third mainstream standard library. Boost.Test
          # is rebuilt against libc++ through the overlay triplet in
          # .github/vcpkg (a libstdc++ Boost would not link). Best-effort
          # until the vcpkg overlay path has proven itself; promote it to a
          # required leg (best_effort: false) once it is green on master.
          - label: 22 libc++
            version: 22
            cc: clang-22
            cxx: clang++-22
            stdlib: libc++
            triplet: x64-linux-libcxx
            cxxflags: "-stdlib=libc++"
            best_effort: true
          - label: 23-SVN
            version: 23
            cc: clang-23
            cxx: clang++-23
            stdlib: libstdc++
            triplet: x64-linux
            cxxflags: ""
            best_effort: false

    steps:
      - uses: actions/checkout@v7

      - name: Install Clang ${{ matrix.version }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ matrix.version }}

      - name: Install libc++ ${{ matrix.version }}
        if: matrix.stdlib == 'libc++'
        run: sudo apt-get install -y libc++-${{ matrix.version }}-dev libc++abi-${{ matrix.version }}-dev

      # Ubuntu 22.04's default libstdc++ (GCC 11) predates the <format>
      # header entirely (added in libstdc++ 13), which xstd/cstdlib.hpp
      # needs for div_t's std::formatter. Clang doesn't bundle its own
      # standard library for -stdlib=libstdc++; it auto-selects the newest
      # GCC installation's headers/runtime it can find, so installing a
      # fresh g++ here (unused as a compiler, only for its libstdc++) is
      # enough - no --gcc-toolchain flag needed. Matches gcc.yml's own
      # fix for the same underlying problem.
      - name: Install a <format>-capable libstdc++
        if: matrix.stdlib == 'libstdc++'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Ubuntu 22.04's libboost-test-dev is Boost 1.74 (2020); vcpkg tracks
      # recent Boost releases instead. apt.llvm.org's Clang packages
      # (including the dev/SVN build) link against the system libstdc++ like
      # every other apt-installed compiler on the runner - no separate
      # bundled runtime, so no ABI mismatch with vcpkg's Boost.Test either.
      # The libc++ leg instead selects the overlay triplet, which rebuilds
      # Boost.Test with Clang against libc++.
      - name: Install Boost.Test
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: >
          vcpkg install
          --triplet ${{ matrix.triplet }}
          --overlay-triplets "$GITHUB_WORKSPACE/.github/vcpkg/triplets"

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          "-DCMAKE_CXX_FLAGS=${{ matrix.cxxflags }}"
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DVCPKG_OVERLAY_TRIPLETS=$GITHUB_WORKSPACE/.github/vcpkg/triplets

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure
