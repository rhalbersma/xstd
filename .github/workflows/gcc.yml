name: GCC

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: GCC ${{ matrix.label }}
    runs-on: ubuntu-22.04
    continue-on-error: ${{ matrix.trunk }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "15"
            version: 15
            cc: gcc-15
            cxx: g++-15
            trunk: false
          - label: "16"
            version: 16
            cc: gcc-16
            cxx: g++-16
            trunk: false
          - label: 17-SVN
            version: 17
            cc: gcc-17
            cxx: g++-17
            trunk: true

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC ${{ matrix.version }} (stable)
        if: "!matrix.trunk"
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cxx }}

      # Best-effort: installs Jonathan Wakely's binary snapshot of GCC trunk
      # (see https://jwakely.github.io/pkg-gcc-latest/). Not an official GCC
      # release, so this leg is allowed to fail (see continue-on-error above).
      - name: Install GCC trunk snapshot
        if: matrix.trunk
        run: |
          wget -q https://kayari.org/gcc-latest/gcc-latest.deb -O gcc-latest.deb
          sudo dpkg -i gcc-latest.deb || sudo apt-get install -f -y
          sudo ln -sf /opt/gcc-latest/bin/gcc        /usr/bin/${{ matrix.cc }}
          sudo ln -sf /opt/gcc-latest/bin/g++        /usr/bin/${{ matrix.cxx }}
          sudo ln -sf /opt/gcc-latest/bin/gcov       /usr/bin/gcov-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcov-dump  /usr/bin/gcov-dump-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcov-tool  /usr/bin/gcov-tool-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcc-ar     /usr/bin/gcc-ar-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcc-nm     /usr/bin/gcc-nm-${{ matrix.version }}
          sudo ln -sf /opt/gcc-latest/bin/gcc-ranlib /usr/bin/gcc-ranlib-${{ matrix.version }}
          printf '%s\n' \
            '# Multiarch support' \
            /opt/gcc-latest/lib \
            /opt/gcc-latest/lib64 | sudo tee /etc/ld.so.conf.d/gcc-latest.conf > /dev/null
          sudo ldconfig
          ${{ matrix.cc }} --version
          ${{ matrix.cxx }} --version

      - name: Install Boost.Test
        run: sudo apt-get install -y libboost-test-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure
