name: Coverage

permissions:
  contents: read
  id-token: write   # tokenless Codecov upload via GitHub OIDC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  coverage:
    name: GCC 15 gcovr
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 15 and gcovr
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-15 python3-pip
          python3 -m pip install --user gcovr
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Boost.Test
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet x64-linux

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc-15
          -DCMAKE_CXX_COMPILER=g++-15
          -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # The library is small enough that full line coverage of include/ is a
      # realistic bar; --fail-under-line turns any regression into a red job.
      - name: Generate coverage report
        run: >
          gcovr --root .
          --gcov-executable gcov-15
          --exclude 'test/.*'
          --exclude 'build/.*'
          --print-summary
          --fail-under-line 100
          --txt coverage.txt
          --xml-pretty --xml coverage.xml

      - name: Publish coverage summary
        if: always()
        run: |
          {
            echo '### Line coverage (gcovr, include/ only)'
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
