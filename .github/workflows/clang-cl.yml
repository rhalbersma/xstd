name: Clang-CL

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    # clang-cl: Clang's MSVC-compatible driver, using the MSVC STL and linker
    # rather than libc++. Exercises Clang's diagnostics (this repo builds
    # with -Weverything -Werror under Clang) against the same code MSVC
    # builds, using whichever LLVM each Visual Studio version bundles (19.1.5
    # for VS 2022, 20.1.8 for VS 2026). The VS 2026 Preview leg deliberately
    # retests the stable clang-cl.exe against the preview MSVC STL: although
    # the driver is shared by both VS channels, their standard-library
    # headers and implementation libraries are distinct. Every row is
    # required like every other leg.
    name: Clang-CL VS ${{ matrix.vs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - vs: 2022
            os: windows-2022
            generator: "Visual Studio 17 2022"
            toolset: "ClangCL,host=x64"
            arch: x64
            triplet: x64-windows
            preview_channel: false
          - vs: 2026
            os: windows-2025
            generator: "Visual Studio 18 2026"
            toolset: "ClangCL,host=x64"
            arch: x64
            triplet: x64-windows
            preview_channel: false
          - vs: 2026-Preview
            os: windows-2025
            generator: "Visual Studio 18 2026"
            arch: x64
            triplet: x64-windows
            preview_channel: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Cache the preview installer payload by channel-manifest revision.
      # Without this, the optional toolset would be downloaded on every run.
      - name: Resolve preview channel manifest version
        if: matrix.preview_channel
        id: preview-channel
        shell: pwsh
        run: |
          $resp = Invoke-WebRequest -Uri 'https://aka.ms/vs/18/pre/channel' -Method Head -UseBasicParsing
          $version = $resp.Headers['ETag']
          if (-not $version) { $version = $resp.Headers['Last-Modified'] }
          Write-Host "Channel manifest version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Cache VS Installer package downloads
        if: matrix.preview_channel
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: C:\ProgramData\Microsoft\VisualStudio\Packages
          key: vs-preview-packages-${{ runner.os }}-${{ steps.preview-channel.outputs.version }}
          restore-keys: |
            vs-preview-packages-${{ runner.os }}-

      # The preview MSVC STL is an optional component on the stable VS 2026
      # installation. Install it so this leg keeps the bundled clang-cl.exe
      # but compiles and links against the preview headers and libraries.
      - name: Install MSVC Preview toolset
        if: matrix.preview_channel
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $instance = & $vswhere -products * -format json | ConvertFrom-Json | Select-Object -First 1
          if (-not $instance) {
            Write-Host "No VS instance found by vswhere to add the Preview toolset to"
            exit 1
          }
          $installPath = $instance.installationPath

          $setup = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $proc = Start-Process -FilePath $setup -Wait -PassThru -ArgumentList (
            'modify', '--quiet', '--norestart',
            '--installPath', "`"$installPath`"",
            '--add', 'Microsoft.VisualStudio.Component.VC.Preview.Tools.x86.x64'
          )
          # 3010 = success, reboot required
          $ok = $proc.ExitCode -eq 0 -or $proc.ExitCode -eq 3010

          $verify = & $vswhere -products * -requires Microsoft.VisualStudio.Component.VC.Preview.Tools.x86.x64 -format json | ConvertFrom-Json
          if (-not $ok -or -not $verify) {
            Write-Host "Preview toolset not present after setup.exe modify (exit code $($proc.ExitCode))."
            exit 1
          }

          # CMake requires the preview toolset's numeric version.
          $newest = Get-ChildItem "$installPath\VC\Tools\MSVC" -Directory |
            Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1 -ExpandProperty Name
          echo "VC_PREVIEW_TOOLSET=$newest" >> $env:GITHUB_ENV

      - name: Report toolchain versions
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $instance = & $vswhere -products * -format json | ConvertFrom-Json | Select-Object -First 1
          if (-not $instance) {
            Write-Host "No Visual Studio instance found by vswhere"
            exit 1
          }
          $installPath = $instance.installationPath
          Write-Host "Visual Studio: $($instance.displayName) $($instance.installationVersion)"
          $toolset = if ($env:VC_PREVIEW_TOOLSET) {
            $env:VC_PREVIEW_TOOLSET
          } else {
            (Get-Content "$installPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
          }
          Write-Host "MSVC STL toolset: $toolset"
          & "$installPath\VC\Tools\Llvm\x64\bin\clang-cl.exe" --version
          & "$installPath\VC\Tools\MSVC\$toolset\bin\Hostx64\x64\cl.exe" /Bv
          cmake --version

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Boost.Test
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet ${{ matrix.triplet }}

      - name: Configure
        if: "!matrix.preview_channel"
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}" -A ${{ matrix.arch }}
          -T ${{ matrix.toolset }}
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (preview MSVC STL)
        if: matrix.preview_channel
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}" -A ${{ matrix.arch }}
          -T "ClangCL,version=$env:VC_PREVIEW_TOOLSET,host=x64"
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -v

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure
