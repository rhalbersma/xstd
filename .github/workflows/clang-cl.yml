name: Clang-CL

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    # clang-cl: Clang's MSVC-compatible driver, using the MSVC STL and linker
    # rather than libc++. Exercises Clang's diagnostics (this repo builds
    # with -Weverything -Werror under Clang) against the same code MSVC
    # builds, using whichever LLVM each Visual Studio version bundles (19.1.5
    # for VS 2022, 20.1.8 for VS 2026). There's no separate entry for the
    # VS 2026 Preview channel: "Clang tools for Windows" is a single VS
    # component shared by the stable and preview MSVC toolsets alike, so it'd
    # be the exact same clang-cl.exe as the VS 2026 (stable) row - testing it
    # again there would add no coverage. Best-effort: see continue-on-error.
    name: Clang-CL VS ${{ matrix.vs }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - vs: 2022
            os: windows-2022
            generator: "Visual Studio 17 2022"
            toolset: "ClangCL,host=x64"
            arch: x64
            triplet: x64-windows
          - vs: 2026
            os: windows-2025
            generator: "Visual Studio 18 2026"
            toolset: "ClangCL,host=x64"
            arch: x64
            triplet: x64-windows

    steps:
      - uses: actions/checkout@v7

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Boost.Test
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet ${{ matrix.triplet }}

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "${{ matrix.generator }}" -A ${{ matrix.arch }}
          -T ${{ matrix.toolset }}
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -v

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure
