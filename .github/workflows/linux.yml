name: Linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.cxx }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: gcc-11
            cxx: g++-11
            gcc_version: 11
          - cc: gcc-12
            cxx: g++-12
            gcc_version: 12
          - cc: gcc-13
            cxx: g++-13
            gcc_version: 13
          - cc: clang-15
            cxx: clang++-15
            clang_version: 15
          - cc: clang-16
            cxx: clang++-16
            clang_version: 16
          - cc: clang-17
            cxx: clang++-17
            clang_version: 17

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC ${{ matrix.gcc_version }}
        if: matrix.gcc_version
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cxx }}

      - name: Install Clang ${{ matrix.clang_version }}
        if: matrix.clang_version
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ matrix.clang_version }}

      - name: Install Boost.Test
        run: sudo apt-get install -y libboost-test-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure
