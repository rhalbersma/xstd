name: Apple Clang

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    # Apple does not publish an open-source Apple Clang trunk/nightly. Test
    # the latest stable Xcode release from each of the two supported series.
    name: Apple Clang ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Xcode 16.4
            os: macos-15
            developer_dir: /Applications/Xcode_16.4.app/Contents/Developer
          - label: Xcode 26.6
            os: macos-26
            developer_dir: /Applications/Xcode_26.6.app/Contents/Developer
    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Report toolchain version
        run: |
          xcodebuild -version
          clang++ --version
          cmake --version

      # Export the two env vars vcpkg's "x-gha" binary source needs to talk
      # to the GitHub Actions cache service, so built packages are reused
      # across runs instead of recompiled from scratch every time.
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # GitHub-hosted macOS runners are arm64 since macos-14; vcpkg's
      # arm64-osx triplet builds Boost.Test with the selected Xcode, so its
      # libc++ ABI always matches the compiler under test.
      - name: Install Boost.Test
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install --triplet arm64-osx

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=arm64-osx

      - name: Build
        run: cmake --build build -v

      - name: Test
        run: ctest --test-dir build --output-on-failure
